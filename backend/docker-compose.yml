version: '3.8'
services:
  db:
    image: postgres:18-bookworm
    environment:
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME}
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql:Z
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data: