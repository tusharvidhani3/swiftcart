spring:
  application:
    name: swiftcart
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/${spring.application.name}}
    username: ${SPRING_DATASOURCE_USERNAME:tushar}
    password: ${SPRING_DATASOURCE_PASSWORD:}
app:
  security:
    auth:
      access-token:
        expiration-minutes: 1440
        secret-key: ${APP_SECURITY_AUTH_ACCESS_TOKEN_SECRET_KEY:devSecretKey123}
      refresh-token:
        expiration-days: 30
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  product:
      images-dir: ${APP_PRODUCT_IMAGES_DIR:${user.home}/cdn/${spring.application.name}_uploads}
logging:
  level:
    org:
      springframework:
        security: TRACE
management:
  endpoints:
    web:
      exposure:
        include: '*'
