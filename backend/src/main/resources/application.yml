spring:
  application:
    name: swiftcart
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${spring.application.name}}
    username: ${SPRING_DATASOURCE_USERNAME:tushar}
    password: ${SPRING_DATASOURCE_PASSWORD:}
app:
  security:
    auth:
      access-token:
        expiration-minutes: 15
        secret-key: ${APP_SECURITY_AUTH_ACCESS_TOKEN_SECRET_KEY:devSecretKey123}
      refresh-token:
        expiration-days: 30
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope: email,profile,openid
            redirect-uri: ${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
    auth:
      success-path: /auth/success
      failure-path: /auth/login
  shipping:
    flat-rate: 70
    free-threshold: 999
  product:
      images-dir: ${APP_PRODUCT_IMAGES_DIR:${user.home}/cdn/${spring.application.name}_uploads}
logging:
  level:
    org:
      springframework:
        security: TRACE
management:
  endpoints:
    web:
      exposure:
        include: '*'
